services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  dali2:
    build:
      context: ../DALI2
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./examples:/dali2/ldinf/examples
    command: ["8080", "ldinf/examples/healthcare_ldinf.pl"]
    depends_on:
      - redis
    init: true
